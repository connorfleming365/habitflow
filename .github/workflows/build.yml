name: Build HabitFlow APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Gradle wrapper
        run: |
          flutter create --org com.habitflow --project-name temp /tmp/temp_proj
          cp /tmp/temp_proj/android/gradlew android/gradlew
          chmod +x android/gradlew
          cp -r /tmp/temp_proj/android/gradle android/gradle

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: habitflow-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
