name: Build HabitFlow APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Android SDK platform 35
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" 2>/dev/null || \
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"

      - name: Scaffold clean Flutter project
        run: |
          flutter create --org com.habitflow --project-name habitflow /tmp/build_app

      - name: Copy Dart source & pubspec
        run: |
          rm -rf /tmp/build_app/lib/*
          cp -r lib/. /tmp/build_app/lib/
          cp pubspec.yaml /tmp/build_app/pubspec.yaml
          mkdir -p /tmp/build_app/assets/sounds
          cp -r assets/. /tmp/build_app/assets/ 2>/dev/null || true

      - name: Copy Android widget files
        run: |
          mkdir -p /tmp/build_app/android/app/src/main/kotlin/com/habitflow/habitflow/
          mkdir -p /tmp/build_app/android/app/src/main/res/layout
          mkdir -p /tmp/build_app/android/app/src/main/res/xml
          cp android/app/src/main/kotlin/com/habitflow/app/HabitWidget.kt \
             /tmp/build_app/android/app/src/main/kotlin/com/habitflow/habitflow/
          cp android/app/src/main/res/layout/habit_widget.xml \
             /tmp/build_app/android/app/src/main/res/layout/
          cp android/app/src/main/res/xml/habit_widget_info.xml \
             /tmp/build_app/android/app/src/main/res/xml/
          cp android/app/src/main/res/drawable/widget_background.xml \
             /tmp/build_app/android/app/src/main/res/drawable/
          cp android/app/src/main/res/drawable/widget_progress_drawable.xml \
             /tmp/build_app/android/app/src/main/res/drawable/
          cp android/app/src/main/res/values/strings.xml \
             /tmp/build_app/android/app/src/main/res/values/strings.xml

      - name: Copy app icons
        run: |
          cp -r android/app/src/main/res/mipmap-mdpi   /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-hdpi   /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-xhdpi  /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-xxhdpi /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-xxxhdpi /tmp/build_app/android/app/src/main/res/

      - name: Add widget receiver to AndroidManifest
        run: |
          sed -i 's|</application>|    <receiver android:name=".HabitWidget" android:exported="true"><intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE"/></intent-filter><meta-data android:name="android.appwidget.provider" android:resource="@xml/habit_widget_info"/></receiver>\n    </application>|' \
            /tmp/build_app/android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        working-directory: /tmp/build_app
        run: flutter pub get

      - name: Build release APK
        working-directory: /tmp/build_app
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: habitflow-release
          path: /tmp/build_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
