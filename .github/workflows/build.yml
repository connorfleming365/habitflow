name: Build HabitFlow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── Android APK ────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Scaffold clean Flutter project
        run: flutter create --org com.habitflow --project-name habitflow /tmp/build_app

      - name: Copy Dart source & pubspec
        run: |
          rm -rf /tmp/build_app/lib/*
          cp -r lib/. /tmp/build_app/lib/
          cp pubspec.yaml /tmp/build_app/pubspec.yaml
          mkdir -p /tmp/build_app/assets/sounds
          cp -r assets/. /tmp/build_app/assets/ 2>/dev/null || true

      - name: Copy Android widget files
        run: |
          mkdir -p /tmp/build_app/android/app/src/main/kotlin/com/habitflow/habitflow/
          mkdir -p /tmp/build_app/android/app/src/main/res/layout
          mkdir -p /tmp/build_app/android/app/src/main/res/xml
          cp android/app/src/main/kotlin/com/habitflow/app/HabitWidget.kt \
             /tmp/build_app/android/app/src/main/kotlin/com/habitflow/habitflow/
          cp android/app/src/main/kotlin/com/habitflow/app/MainActivity.kt \
             /tmp/build_app/android/app/src/main/kotlin/com/habitflow/habitflow/
          cp android/app/src/main/kotlin/com/habitflow/app/HabitWidgetService.kt \
             /tmp/build_app/android/app/src/main/kotlin/com/habitflow/habitflow/
          cp android/app/src/main/kotlin/com/habitflow/app/HabitWidgetFactory.kt \
             /tmp/build_app/android/app/src/main/kotlin/com/habitflow/habitflow/
          cp android/app/src/main/res/layout/habit_widget.xml \
             /tmp/build_app/android/app/src/main/res/layout/
          cp android/app/src/main/res/layout/habit_widget_item.xml \
             /tmp/build_app/android/app/src/main/res/layout/
          cp android/app/src/main/res/xml/habit_widget_info.xml \
             /tmp/build_app/android/app/src/main/res/xml/
          cp android/app/src/main/res/drawable/widget_background.xml \
             /tmp/build_app/android/app/src/main/res/drawable/
          cp android/app/src/main/res/drawable/widget_progress_drawable.xml \
             /tmp/build_app/android/app/src/main/res/drawable/
          cp android/app/src/main/res/drawable/widget_circle_normal.xml \
             /tmp/build_app/android/app/src/main/res/drawable/
          cp android/app/src/main/res/drawable/widget_circle_done.xml \
             /tmp/build_app/android/app/src/main/res/drawable/
          cp android/app/src/main/res/values/strings.xml \
             /tmp/build_app/android/app/src/main/res/values/strings.xml

      - name: Copy app icons
        run: |
          cp -r android/app/src/main/res/mipmap-mdpi       /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-hdpi       /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-xhdpi      /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-xxhdpi     /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-xxxhdpi    /tmp/build_app/android/app/src/main/res/
          cp -r android/app/src/main/res/mipmap-anydpi-v26 /tmp/build_app/android/app/src/main/res/
          cp android/app/src/main/res/values/colors.xml    /tmp/build_app/android/app/src/main/res/values/

      - name: Set app label to Swell in AndroidManifest
        run: |
          sed -i 's|android:label="habitflow"|android:label="Swell"|g' \
            /tmp/build_app/android/app/src/main/AndroidManifest.xml

      - name: Add widget receiver to AndroidManifest
        run: |
          sed -i 's|</application>|    <receiver android:name=".HabitWidget" android:exported="true"><intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE"/><action android:name="com.habitflow.habitflow.TOGGLE_HABIT"/></intent-filter><meta-data android:name="android.appwidget.provider" android:resource="@xml/habit_widget_info"/></receiver><service android:name=".HabitWidgetService" android:exported="false" android:permission="android.permission.BIND_REMOTEVIEWS"/>\n    </application>|' \
            /tmp/build_app/android/app/src/main/AndroidManifest.xml

      - name: Add permissions to AndroidManifest
        run: |
          MANIFEST=/tmp/build_app/android/app/src/main/AndroidManifest.xml
          # Inject permissions and url_launcher <queries> block
          sed -i 's|<manifest |<manifest |' "$MANIFEST"
          sed -i 's|<application|<queries><intent><action android:name="android.intent.action.VIEW"/><data android:scheme="https"/></intent></queries>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <application|' \
            "$MANIFEST"

      - name: Fix Kotlin stdlib duplicate class conflict
        run: |
          cat >> /tmp/build_app/android/build.gradle << 'EOF'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Get dependencies
        working-directory: /tmp/build_app
        run: flutter pub get

      - name: Build release APK
        working-directory: /tmp/build_app
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: swell-release
          path: /tmp/build_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Web PWA → GitHub Pages ─────────────────────────────────
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Scaffold Flutter project with web support
        run: flutter create --org com.habitflow --project-name habitflow /tmp/web_app

      - name: Copy Dart source & pubspec
        run: |
          rm -rf /tmp/web_app/lib/*
          cp -r lib/. /tmp/web_app/lib/
          cp pubspec.yaml /tmp/web_app/pubspec.yaml
          mkdir -p /tmp/web_app/assets/sounds
          cp -r assets/. /tmp/web_app/assets/ 2>/dev/null || true

      - name: Patch web/index.html for PWA
        run: |
          # Set app name and theme colour in the generated index.html
          sed -i 's|<title>habitflow</title>|<title>Swell</title>|' \
            /tmp/web_app/web/index.html
          # Add apple-mobile-web-app meta tags for iOS "Add to Home Screen"
          sed -i 's|</head>|  <meta name="apple-mobile-web-app-capable" content="yes">\n  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">\n  <meta name="apple-mobile-web-app-title" content="Swell">\n  <meta name="theme-color" content="#041C2C">\n</head>|' \
            /tmp/web_app/web/index.html

      - name: Patch web/manifest.json for PWA
        run: |
          cat > /tmp/web_app/web/manifest.json << 'EOF'
          {
            "name": "Swell",
            "short_name": "Swell",
            "description": "Build your swell. Drop by drop.",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#041C2C",
            "theme_color": "#041C2C",
            "orientation": "portrait",
            "icons": [
              {
                "src": "icons/Icon-192.png",
                "sizes": "192x192",
                "type": "image/png"
              },
              {
                "src": "icons/Icon-512.png",
                "sizes": "512x512",
                "type": "image/png"
              },
              {
                "src": "icons/Icon-maskable-192.png",
                "sizes": "192x192",
                "type": "image/png",
                "purpose": "maskable"
              },
              {
                "src": "icons/Icon-maskable-512.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "maskable"
              }
            ]
          }
          EOF

      - name: Get dependencies
        working-directory: /tmp/web_app
        run: flutter pub get

      - name: Build web release
        working-directory: /tmp/web_app
        run: flutter build web --release --base-href /

      - name: Copy privacy policy into web build
        run: cp privacy-policy.html /tmp/web_app/build/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/web_app/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
