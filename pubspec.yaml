name: habitflow
description: A simple, beautiful habit tracker with home screen widget.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.2
  home_widget: ^0.5.0
  intl: ^0.19.0
  uuid: ^4.4.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
