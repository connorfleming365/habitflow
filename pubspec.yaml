name: habitflow
description: A simple, beautiful habit tracker with home screen widget.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.2
  intl: ^0.19.0
  uuid: ^4.4.0
  fl_chart: ^0.68.0
  share_plus: ^10.0.0
  just_audio: ^0.9.40
  flutter_timezone: ^3.0.0
  video_player: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/intro_video.mp4
    - assets/splash_video.mp4
    - assets/ocean_bg.jpg
    - assets/habitflow_logo_white.png
    - assets/swell_logo_white.png
    - assets/sounds/water_drop.mp3
    - assets/sounds/water_drop_new.mp3
    - assets/sounds/water_drop.wav
    - assets/sounds/wave.wav
    - assets/sounds/flow.wav
    - assets/sounds/ocean_waves.mp3
    - assets/sounds/level_up.mp3
